<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MENTI Design Vote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;600;700&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0ebe4;
  --card: #ffffff;
  --text: #3d3229;
  --text-light: rgba(61,50,41,0.5);
  --accent: #c4785a;
  --accent-dark: #a65d3f;
  --border: rgba(61,50,41,0.08);
  --success: #2d7a69;
  --elad-color: #c4785a;
  --zohar-color: #7b8fa6;
  --keren-color: #8b9a8e;
}

body {
  font-family: 'Noto Sans Hebrew', 'Rubik', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── HEADER ─── */
.site-header {
  background: rgba(61,50,41,0.95);
  backdrop-filter: blur(12px);
  padding: 20px 24px;
  text-align: center;
  position: sticky; top: 0; z-index: 100;
}
.site-header h1 { font-size: 22px; font-weight: 700; color: white; margin-bottom: 4px; }
.site-header p { font-size: 13px; color: rgba(255,255,255,0.5); }

/* ─── VOTER SELECTOR ─── */
.voter-bar {
  background: rgba(61,50,41,0.85);
  backdrop-filter: blur(8px);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  position: sticky; top: 72px; z-index: 99;
}
.voter-bar .label { font-size: 13px; color: rgba(255,255,255,0.6); font-weight: 500; }
.voter-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 20px; border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.7);
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.3s; font-family: inherit;
}
.voter-btn .avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: white;
}
.voter-btn[data-voter="elad"] .avatar { background: var(--elad-color); }
.voter-btn[data-voter="zohar"] .avatar { background: var(--zohar-color); }
.voter-btn[data-voter="keren"] .avatar { background: var(--keren-color); }
.voter-btn.active { border-color: white; color: white; background: rgba(255,255,255,0.1); }
.voter-btn:hover:not(.active) { border-color: rgba(255,255,255,0.4); }

/* ─── NAV ─── */
.section-nav {
  background: white; border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-wrap: wrap;
  position: sticky; top: 120px; z-index: 98;
}
.nav-link {
  padding: 6px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
  color: var(--text-light); background: transparent;
  border: 1px solid var(--border); cursor: pointer;
  transition: all 0.25s; font-family: inherit; text-decoration: none;
}
.nav-link:hover { border-color: var(--accent); color: var(--accent); }
.nav-link .check { color: var(--success); margin-right: 4px; }

/* ─── CONTENT ─── */
.content { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* ─── SECTION ─── */
.vote-section { margin-bottom: 56px; scroll-margin-top: 180px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.section-header h2 { font-size: 22px; font-weight: 700; }

/* ─── OPTION TABS ─── */
.option-tabs {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.option-tab {
  flex: 1; min-width: 140px;
  padding: 12px 16px; border-radius: 14px;
  border: 2px solid var(--border); background: var(--card);
  cursor: pointer; font-family: inherit; font-size: 13px;
  font-weight: 600; color: var(--text);
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.option-tab:hover { border-color: rgba(196,120,90,0.3); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.option-tab.active {
  border-color: var(--accent);
  background: rgba(196,120,90,0.04);
  box-shadow: 0 2px 12px rgba(196,120,90,0.1);
}
.option-tab.voted-tab {
  border-color: var(--accent); background: var(--accent); color: white;
}
.option-tab.voted-tab .voter-dot-sm { border-color: rgba(255,255,255,0.3); }

.tab-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab-dots { display: flex; gap: 3px; flex-shrink: 0; }

.voter-dot-sm {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: white;
  opacity: 0.15; transition: opacity 0.3s;
}
.voter-dot-sm.active { opacity: 1; }
.voter-dot-sm[data-v="elad"] { background: var(--elad-color); }
.voter-dot-sm[data-v="zohar"] { background: var(--zohar-color); }
.voter-dot-sm[data-v="keren"] { background: var(--keren-color); }

/* ─── PREVIEW CONTAINER ─── */
.preview-container {
  background: var(--card); border-radius: 16px; overflow: hidden;
  border: 2px solid var(--border);
  transition: all 0.3s;
}
.preview-container.selected { border-color: var(--accent); box-shadow: 0 8px 30px rgba(196,120,90,0.15); }

.preview-iframe-wrap {
  width: 100%;
  height: clamp(400px, 60vh, 700px);
  overflow: hidden; position: relative;
  background: #f8f5f1;
}
.preview-iframe-wrap iframe {
  width: 125%; height: 125%;
  transform: scale(0.8); transform-origin: top right;
  border: none; pointer-events: none;
}
.preview-iframe-wrap .iframe-overlay {
  position: absolute; inset: 0; z-index: 1; cursor: pointer;
}

.preview-info {
  padding: 20px 24px; border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap;
}
.preview-info-text { flex: 1; min-width: 200px; }
.preview-info-text h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.preview-info-text p { font-size: 13px; color: var(--text-light); line-height: 1.7; }

.preview-actions {
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  flex-wrap: wrap;
}

.vote-btn {
  padding: 10px 24px; border-radius: 12px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  border: 2px solid var(--border); background: transparent;
  color: var(--text-light); transition: all 0.25s; font-family: inherit;
}
.vote-btn:hover { border-color: var(--accent); color: var(--accent); }
.vote-btn.voted {
  background: var(--accent); border-color: var(--accent); color: white;
}

.fullsize-link {
  font-size: 13px; color: var(--accent); text-decoration: none;
  font-weight: 600; padding: 10px 16px; border-radius: 12px;
  background: rgba(196,120,90,0.06); transition: all 0.25s;
  white-space: nowrap;
}
.fullsize-link:hover { background: rgba(196,120,90,0.12); }

/* ─── FULLSCREEN MODAL ─── */
.fullscreen-modal {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(61,50,41,0.92); backdrop-filter: blur(8px);
  padding: 20px;
  flex-direction: column; align-items: center; justify-content: center;
}
.fullscreen-modal.show { display: flex; }
.fullscreen-modal .modal-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 1400px; margin-bottom: 12px;
}
.fullscreen-modal .modal-title {
  font-size: 16px; font-weight: 600; color: white;
}
.close-modal {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: white; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.close-modal:hover { background: rgba(255,255,255,0.2); }
.fullscreen-modal iframe {
  width: 100%; max-width: 1400px;
  height: calc(100vh - 100px);
  border: none; border-radius: 12px; background: white;
}

/* ─── RESULTS TABLE ─── */
.results-section {
  background: var(--card); border-radius: 16px; padding: 24px;
  border: 1px solid var(--border); margin-bottom: 48px;
}
.results-section h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
.results-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.results-table th {
  text-align: right; padding: 10px 12px;
  background: rgba(61,50,41,0.04); font-weight: 600;
  border-bottom: 2px solid var(--border);
}
.results-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.results-table .match { color: var(--success); font-weight: 600; }
.results-table .pending { color: var(--text-light); font-style: italic; }

/* ─── NO VOTER OVERLAY ─── */
.no-voter-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 200;
  background: rgba(61,50,41,0.8); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.no-voter-overlay.show { display: flex; }
.no-voter-box {
  background: white; border-radius: 20px; padding: 32px 40px;
  text-align: center; max-width: 400px;
}
.no-voter-box h2 { font-size: 20px; margin-bottom: 12px; }
.no-voter-box p { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }

/* ─── STATUS BAR ─── */
.status-bar {
  background: rgba(45,122,105,0.08);
  border: 1px solid rgba(45,122,105,0.15);
  border-radius: 12px; padding: 12px 20px;
  margin-bottom: 24px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--success); font-weight: 600;
}
.status-bar .progress { font-size: 12px; font-weight: 400; color: var(--text-light); }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .option-tabs { gap: 6px; }
  .option-tab { min-width: 100px; padding: 10px 12px; font-size: 12px; }
  .preview-info { flex-direction: column; gap: 12px; padding: 16px; }
  .preview-actions { width: 100%; justify-content: space-between; }
  .voter-bar { flex-wrap: wrap; gap: 8px; }
  .section-nav { gap: 4px; }
}
</style>
</head>
<body>

<div class="site-header">
  <h1>MENTI Design Vote</h1>
  <p>בחרו את הכיוון העיצובי המועדף — כל הצבעה נשמרת אוטומטית</p>
</div>

<div class="voter-bar">
  <span class="label">מי את/ה?</span>
  <button class="voter-btn" data-voter="elad" onclick="selectVoter('elad')">
    <span class="avatar">א</span> אלעד
  </button>
  <button class="voter-btn" data-voter="zohar" onclick="selectVoter('zohar')">
    <span class="avatar">ז</span> זוהר
  </button>
  <button class="voter-btn" data-voter="keren" onclick="selectVoter('keren')">
    <span class="avatar">ק</span> קרן
  </button>
</div>

<div class="section-nav" id="section-nav"></div>

<div class="content">
  <div class="status-bar" id="status-bar">
    <span id="status-text">בחרו את שמכם למעלה כדי להתחיל</span>
    <span class="progress" id="status-progress"></span>
  </div>

  <div id="sections-container"></div>

  <div class="results-section" id="results-section">
    <h2>סיכום הצבעות</h2>
    <table class="results-table">
      <thead>
        <tr>
          <th>קטגוריה</th>
          <th>אלעד</th>
          <th>זוהר</th>
          <th>קרן</th>
          <th>הסכמה</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>

<!-- No voter overlay -->
<div class="no-voter-overlay" id="no-voter-overlay">
  <div class="no-voter-box">
    <h2>מי את/ה?</h2>
    <p>בחרו את שמכם כדי להתחיל להצביע</p>
    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="voter-btn" data-voter="elad" onclick="selectVoter('elad')" style="color:#3d3229;border-color:var(--elad-color);">
        <span class="avatar">א</span> אלעד
      </button>
      <button class="voter-btn" data-voter="zohar" onclick="selectVoter('zohar')" style="color:#3d3229;border-color:var(--zohar-color);">
        <span class="avatar">ז</span> זוהר
      </button>
      <button class="voter-btn" data-voter="keren" onclick="selectVoter('keren')" style="color:#3d3229;border-color:var(--keren-color);">
        <span class="avatar">ק</span> קרן
      </button>
    </div>
  </div>
</div>

<!-- Fullscreen modal -->
<div class="fullscreen-modal" id="fullscreen-modal">
  <div class="modal-header">
    <span class="modal-title" id="modal-title"></span>
    <button class="close-modal" onclick="closeFullscreen()">&times;</button>
  </div>
  <iframe id="fullscreen-iframe" sandbox="allow-scripts"></iframe>
</div>

<script>
const API_URL = 'https://menti-api-333637302786.me-west1.run.app/api/votes';

let currentVoter = localStorage.getItem('menti_design_voter') || null;
let allVotes = {};
let activeTabs = {};

// ─── SECTION DEFINITIONS ───
const SECTIONS = [
  {
    id: 'welcome',
    title: 'מסך פתיחה',
    mockupFile: 'mock-welcome-options.html',
    options: [
      { key: 'A', title: 'A: Aura Minimal', desc: 'רקע חולי, grain overlay, כרטיס זכוכית, טיפוגרפיה קלה (300 weight), section labels — תחושת פלטפורמה טיפולית פרימיום' },
      { key: 'B', title: 'B: Headspace Warm', desc: 'גרדיאנט hero בולט עם אנימציה, badge "סביבה בטוחה", כרטיס הוראות — חם ומוכר, מבנה MENTI קיים' },
      { key: 'C', title: 'C: Hybrid', desc: 'Hero קומפקטי, כרטיס whisper להוראות, בחירת מגדר בסגנון זכוכית, שלבים 1-2-3 — שילוב הטוב משניהם' },
    ]
  },
  {
    id: 'chat',
    title: 'מסך שיחה',
    mockupFile: 'mock-chat-options.html',
    options: [
      { key: 'A', title: 'A: Aura Whisper', desc: 'רקע חולי + grain, טקסט בוט קל (300 weight, 20px), בועות זכוכית, מנטור ככרטיס whisper צף — פרימיום' },
      { key: 'B', title: 'B: Immersive Minimal', desc: 'אווטאר עגול, כרטיסי הודעות לבנים, בועות גרדיאנט למשתמש, מנטור ככרטיס עם badge, input pill — מודרני' },
      { key: 'C', title: 'C: Current Enhanced', desc: 'עיצוב MENTI הנוכחי משופר — אותו border-right, אותו layout, ריווח טוב יותר, צללים עדינים — שינוי מינימלי' },
    ]
  },
  {
    id: 'feedback',
    title: 'מסך פידבק',
    mockupFile: 'mock-feedback-options.html',
    options: [
      { key: 'A', title: 'A: Score Rings', desc: 'טבעות SVG רדיאליות (sage/rose-gold), ציטוטי שיחה עם הסברי "למה", אנימציות stagger, grain — פרימיום' },
      { key: 'B', title: 'B: Structured Report', desc: 'header גרדיאנט, כרטיס סיכום ציונים, סעיפים דו-צבעיים (sage לחוזקות, rose-gold לשיפורים), פעולות ממוספרות' },
      { key: 'C', title: 'C: Card Accordion', desc: 'כרטיסים לבנים מתרחבים לכל ממד, סיכום עם עיגול ציון, pills לציונים, לחיצה לפתיחה — סריקה מהירה' },
    ]
  },
  {
    id: 'simselect',
    title: 'בחירת סימולציה',
    mockupFile: 'mock-simulation-options.html',
    options: [
      { key: 'A', title: 'A: Module Grid', desc: 'רשת כרטיסים עם תמונות ב-3:4, badge סטטוס (DONE/IN PROGRESS), מנעול לסימולציות נעולות, אנימציות cascade — פרימיום' },
      { key: 'B', title: 'B: Compact List', desc: 'רשימה אופקית — אייקון + כותרת + תיאור + pill סטטוס + חץ, סינון לפי סוג טיפול — יעיל ותכליתי' },
      { key: 'C', title: 'C: Current Enhanced', desc: 'דרופדאון משופר + כרטיס תצוגה מקדימה עם תמונה, תיאור ומטא-דאטה — שינוי מינימלי, סיכון נמוך' },
    ]
  },
  {
    id: 'tokens',
    title: 'שפת עיצוב (Design Tokens)',
    mockupFile: 'mock-components.html',
    options: [
      { key: 'current', title: 'Nature Distilled (נוכחי)', desc: 'הפלטה הנוכחית — כבד (700 weight), צללים חמים, 4 רמות צל, גבולות 6-20px, easing קיים — עובד היום' },
      { key: 'proposed', title: 'Aura-Inspired (מוצע)', desc: 'תוספת sand/sage/rose-gold, טיפוגרפיה קלה (300 weight), צללים דקיקים, grain overlay, section labels, easing חדש — שדרוג משמעותי' },
    ]
  },
  {
    id: 'mobile',
    title: 'כיוון מובייל',
    mockupFile: 'mock-mobile-options.html',
    options: [
      { key: 'refined', title: 'שיפור הנוכחי', desc: 'שמירה על המבנה הקיים עם שיפורי ריווח, touch targets, ו-safe areas — שינוי מינימלי, תוצאה מיידית' },
      { key: 'redesign', title: 'עיצוב מחדש (Aura)', desc: 'רקע חולי, grain, whisper cards למנטור, טבעות ציון, glass forms — חוויה פרימיום אחידה בדסקטופ ומובייל' },
    ]
  }
];

// ─── RENDER SECTIONS ───
function renderSections() {
  const container = document.getElementById('sections-container');
  const nav = document.getElementById('section-nav');
  let html = '';
  let navHtml = '';

  SECTIONS.forEach(section => {
    if (!activeTabs[section.id]) activeTabs[section.id] = section.options[0].key;
    const activeOpt = section.options.find(o => o.key === activeTabs[section.id]) || section.options[0];

    navHtml += '<a href="#section-' + section.id + '" class="nav-link" id="nav-' + section.id + '">' +
      '<span class="check" id="check-' + section.id + '"></span>' + section.title + '</a>';

    html += '<div class="vote-section" id="section-' + section.id + '">';
    html += '<div class="section-header"><h2>' + section.title + '</h2></div>';

    // Option tabs
    html += '<div class="option-tabs">';
    section.options.forEach(function(opt) {
      var isActive = opt.key === activeTabs[section.id];
      html += '<button class="option-tab' + (isActive ? ' active' : '') + '" ' +
        'id="tab-' + section.id + '-' + opt.key + '" ' +
        'onclick="switchTab(\'' + section.id + '\',\'' + opt.key + '\')">';
      html += '<span class="tab-label">' + opt.title + '</span>';
      html += '<span class="tab-dots">';
      html += '<span class="voter-dot-sm" data-v="elad" id="tdot-' + section.id + '-' + opt.key + '-elad">\u05D0</span>';
      html += '<span class="voter-dot-sm" data-v="zohar" id="tdot-' + section.id + '-' + opt.key + '-zohar">\u05D6</span>';
      html += '<span class="voter-dot-sm" data-v="keren" id="tdot-' + section.id + '-' + opt.key + '-keren">\u05E7</span>';
      html += '</span>';
      html += '</button>';
    });
    html += '</div>';

    // Preview container
    var iframeSrc = section.mockupFile + '?opt=' + activeOpt.key + '&embed=1';
    html += '<div class="preview-container" id="preview-' + section.id + '">';
    html += '<div class="preview-iframe-wrap">';
    html += '<iframe id="iframe-' + section.id + '" src="' + iframeSrc + '" loading="lazy" sandbox="allow-scripts"></iframe>';
    html += '<div class="iframe-overlay" onclick="voteCurrentTab(\'' + section.id + '\')"></div>';
    html += '</div>';

    // Info bar
    html += '<div class="preview-info">';
    html += '<div class="preview-info-text">';
    html += '<h3 id="ptitle-' + section.id + '">' + activeOpt.title + '</h3>';
    html += '<p id="pdesc-' + section.id + '">' + activeOpt.desc + '</p>';
    html += '</div>';
    html += '<div class="preview-actions">';
    html += '<button class="vote-btn" id="pvote-' + section.id + '" onclick="voteCurrentTab(\'' + section.id + '\')">\u05D4\u05E6\u05D1\u05E2</button>';
    html += '<a class="fullsize-link" id="pfull-' + section.id + '" href="' + section.mockupFile + '?opt=' + activeOpt.key + '&embed=1" onclick="event.preventDefault(); openFullscreen(\'' + section.id + '\')">\u05E6\u05E4\u05D4 \u05D1\u05D2\u05D5\u05D3\u05DC \u05DE\u05DC\u05D0 \u2190</a>';
    html += '</div>';
    html += '</div>';
    html += '</div>'; // preview-container

    html += '</div>'; // vote-section
  });

  container.innerHTML = html;
  nav.innerHTML = navHtml;
}

// ─── SWITCH TAB ───
function switchTab(sectionId, optKey) {
  activeTabs[sectionId] = optKey;
  var section = SECTIONS.find(function(s) { return s.id === sectionId; });
  if (!section) return;
  var opt = section.options.find(function(o) { return o.key === optKey; });
  if (!opt) return;

  // Update iframe src
  var iframe = document.getElementById('iframe-' + sectionId);
  var newSrc = section.mockupFile + '?opt=' + optKey + '&embed=1';
  if (iframe) iframe.src = newSrc;

  // Update info
  var title = document.getElementById('ptitle-' + sectionId);
  var desc = document.getElementById('pdesc-' + sectionId);
  var fullLink = document.getElementById('pfull-' + sectionId);
  if (title) title.textContent = opt.title;
  if (desc) desc.textContent = opt.desc;
  if (fullLink) fullLink.href = newSrc;

  // Update tab active states
  section.options.forEach(function(o) {
    var tab = document.getElementById('tab-' + sectionId + '-' + o.key);
    if (tab) tab.classList.toggle('active', o.key === optKey);
  });

  // Update vote button state
  updateUI();
}

// ─── VOTE CURRENT TAB ───
function voteCurrentTab(sectionId) {
  vote(sectionId, activeTabs[sectionId]);
}

// ─── FULLSCREEN ───
function openFullscreen(sectionId) {
  var section = SECTIONS.find(function(s) { return s.id === sectionId; });
  if (!section) return;
  var optKey = activeTabs[sectionId];
  var opt = section.options.find(function(o) { return o.key === optKey; });
  if (!opt) return;

  var modal = document.getElementById('fullscreen-modal');
  var iframe = document.getElementById('fullscreen-iframe');
  var title = document.getElementById('modal-title');

  if (title) title.textContent = section.title + ' \u2014 ' + opt.title;
  if (iframe) iframe.src = section.mockupFile + '?opt=' + optKey + '&embed=1';
  if (modal) modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  var modal = document.getElementById('fullscreen-modal');
  var iframe = document.getElementById('fullscreen-iframe');
  if (modal) modal.classList.remove('show');
  if (iframe) iframe.src = '';
  document.body.style.overflow = '';
}

// Close modal on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeFullscreen();
});

// ─── VOTER SELECTION ───
function selectVoter(name) {
  currentVoter = name;
  localStorage.setItem('menti_design_voter', name);
  document.getElementById('no-voter-overlay').classList.remove('show');

  document.querySelectorAll('.voter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.voter === name);
  });

  updateUI();
}

// ─── VOTE ───
async function vote(category, choice) {
  if (!currentVoter) {
    document.getElementById('no-voter-overlay').classList.add('show');
    return;
  }

  if (!allVotes[currentVoter]) allVotes[currentVoter] = {};
  allVotes[currentVoter][category] = choice;
  updateUI();

  try {
    var res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voter: currentVoter, category: category, choice: choice }),
    });
    if (res.ok) {
      var data = await res.json();
      allVotes = data.votes || allVotes;
      updateUI();
    }
  } catch (err) {
    console.warn('Vote save failed, using local state:', err);
  }
}

// ─── LOAD VOTES ───
async function loadVotes() {
  try {
    var res = await fetch(API_URL);
    if (res.ok) {
      allVotes = await res.json();
    }
  } catch (err) {
    console.warn('Could not load votes:', err);
  }
  updateUI();
}

// ─── UPDATE UI ───
function updateUI() {
  var voters = ['elad', 'zohar', 'keren'];

  SECTIONS.forEach(function(section) {
    var sectionVoted = false;
    var myVoteInSection = currentVoter && allVotes[currentVoter] ? allVotes[currentVoter][section.id] : null;

    section.options.forEach(function(opt) {
      // Tab voter dots
      voters.forEach(function(v) {
        var dot = document.getElementById('tdot-' + section.id + '-' + opt.key + '-' + v);
        if (dot) {
          var voted = allVotes[v] && allVotes[v][section.id] === opt.key;
          dot.classList.toggle('active', voted);
        }
      });

      // Tab voted state (highlight the tab that current voter voted for)
      var tab = document.getElementById('tab-' + section.id + '-' + opt.key);
      if (tab) {
        var isMyVote = myVoteInSection === opt.key;
        tab.classList.toggle('voted-tab', isMyVote);
        if (isMyVote) sectionVoted = true;
      }
    });

    // Update preview container border (selected if viewing voted option)
    var preview = document.getElementById('preview-' + section.id);
    if (preview) {
      var viewingVoted = myVoteInSection === activeTabs[section.id];
      preview.classList.toggle('selected', viewingVoted);
    }

    // Update vote button in preview
    var voteBtn = document.getElementById('pvote-' + section.id);
    if (voteBtn) {
      var isCurrentTabVoted = myVoteInSection === activeTabs[section.id];
      voteBtn.classList.toggle('voted', isCurrentTabVoted);
      voteBtn.textContent = isCurrentTabVoted ? '\u05D4\u05D1\u05D7\u05D9\u05E8\u05D4 \u05E9\u05DC\u05D9 \u2713' : '\u05D4\u05E6\u05D1\u05E2';
    }

    // Nav check
    var check = document.getElementById('check-' + section.id);
    if (check) check.textContent = sectionVoted ? '\u2713 ' : '';
  });

  // Status bar
  var statusText = document.getElementById('status-text');
  var statusProgress = document.getElementById('status-progress');
  if (currentVoter) {
    var myVotes = allVotes[currentVoter] || {};
    var votedCount = Object.keys(myVotes).length;
    var total = SECTIONS.length;
    var voterNames = { elad: '\u05D0\u05DC\u05E2\u05D3', zohar: '\u05D6\u05D5\u05D4\u05E8', keren: '\u05E7\u05E8\u05DF' };
    statusText.textContent = voterNames[currentVoter] + ', \u05D4\u05E6\u05D1\u05E2\u05EA \u05D1-' + votedCount + ' \u05DE\u05EA\u05D5\u05DA ' + total + ' \u05E7\u05D8\u05D2\u05D5\u05E8\u05D9\u05D5\u05EA';
    statusProgress.textContent = votedCount === total ? '\u05D4\u05D5\u05E9\u05DC\u05DD!' : (total - votedCount) + ' \u05E0\u05D5\u05EA\u05E8\u05D5';
  }

  renderResults();
}

// ─── RESULTS TABLE ───
function renderResults() {
  var tbody = document.getElementById('results-body');
  var html = '';

  SECTIONS.forEach(function(section) {
    var eVote = (allVotes.elad || {})[section.id] || null;
    var zVote = (allVotes.zohar || {})[section.id] || null;
    var kVote = (allVotes.keren || {})[section.id] || null;

    var allSame = eVote && zVote && kVote && eVote === zVote && zVote === kVote;
    var consensus = allSame ? '<span class="match">' + eVote + '</span>' : (eVote || zVote || kVote ? '\u05D8\u05E8\u05DD \u05D4\u05D5\u05DB\u05E8\u05E2' : '-');

    html += '<tr>';
    html += '<td><strong>' + section.title + '</strong></td>';
    html += '<td class="' + (eVote ? '' : 'pending') + '">' + (eVote || '\u05D8\u05E8\u05DD \u05D4\u05E6\u05D1\u05D9\u05E2') + '</td>';
    html += '<td class="' + (zVote ? '' : 'pending') + '">' + (zVote || '\u05D8\u05E8\u05DD \u05D4\u05E6\u05D1\u05D9\u05E2') + '</td>';
    html += '<td class="' + (kVote ? '' : 'pending') + '">' + (kVote || '\u05D8\u05E8\u05DD \u05D4\u05E6\u05D1\u05D9\u05E2') + '</td>';
    html += '<td>' + consensus + '</td>';
    html += '</tr>';
  });

  tbody.innerHTML = html;
}

// ─── INIT ───
renderSections();
if (currentVoter) selectVoter(currentVoter);
else document.getElementById('no-voter-overlay').classList.add('show');
loadVotes();

setInterval(loadVotes, 15000);
</script>
